# Finance-flavoured lexicon overrides for VADER.
#
# VADER's default vocabulary treats finance terms naively — "puts" is neutral
# to it, but in WSB context it's a strong bearish signal. We override the
# scoring for ~60 high-signal terms.
#
# VADER's compound score is in [-1, 1] but its raw lexicon weights are in
# [-4, 4]. Stay within that band. Values here will pass into
# `SentimentIntensityAnalyzer.lexicon.update(...)`.
#
# Version: this file's contents participate in the VaderScorer.model_version
# string, so cache invalidation happens automatically when terms are edited.

version: "2026.05.14"

# Strongly bearish
bagholder: -3.0
bagholders: -3.0
puts: -2.5
bear: -1.5
bearish: -2.0
"bear case": -1.5
"bear market": -2.0
crash: -2.5
crashing: -2.5
"rug pull": -3.5
"rug pulled": -3.5
"paper hands": -1.5
"earnings miss": -3.0
"missed earnings": -3.0
overvalued: -1.8
"fair value below": -1.5
shorting: -1.8
shorted: -1.5
downgrade: -2.0
downgraded: -2.0
dumping: -2.0
dumped: -2.0
"sell off": -2.0
"selloff": -2.0
collapse: -2.8
plunge: -2.5
plunged: -2.5
tanking: -2.5

