# Smoke run config used by tests and the verification flow.
# Demonstrates `extends:` inheritance — backtest costs + universe filters come
# from base.yaml; this file adds the dates, sources, signal, strategy, and
# execution slots that a complete RunConfig needs.

extends: ../base.yaml
run_id: smoke-v1

data_sources:
  - type: yfinance.prices.daily
  - type: arctic_shift.posts

signals:
  - type: reddit_sentiment
    name: reddit_sentiment_v1
    params:
      scorer:
        type: vader
        params:
          lexicon_path: configs/sentiment_lexicon.yaml
      aggregation: score_weighted_mean
      decay_halflife_hours: 24
      sources: [arctic_shift.posts]

strategy:
  type: mean_reversion
  signals: [reddit_sentiment_v1]

backtest:
  start: 2024-01-01
  end: 2024-12-31
  train_end: 2024-06-30
  test_end: 2024-09-30

execution:
  type: backtest
