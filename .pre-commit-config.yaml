default_language_version:
  python: python3.12

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.5
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.6
          - types-PyYAML
        args: ["--strict", "--config-file=pyproject.toml"]
        files: ^src/

  - repo: local
    hooks:
      - id: pytest-unit-fast
        name: pytest unit tests (fast)
        entry: uv run pytest -x --ff -m "not slow and not integration and not e2e" --no-cov
        language: system
        types: [python]
        pass_filenames: false

      - id: import-linter
        name: enforce layer boundaries
        entry: uv run lint-imports
        language: system
        types: [python]
        pass_filenames: false

      - id: no-holdout-log-edit
        name: protect holdout override log
        entry: scripts/check_holdout_log_untouched.sh
        language: system
        pass_filenames: true
        files: ^data/runs/holdout_overrides\.log$
